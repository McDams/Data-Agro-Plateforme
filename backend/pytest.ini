[pytest]
# Fixed 2 xdist workers (deterministic). loadscope pins each test class/module to one worker —
# the suite shares one backend instance and assumes sequential shared state per module, so this
# parallelizes across classes/modules without cross-test races.
# Serial run = `-n 0` (NOT `-p no:xdist`, which errors because addopts still passes -n/--dist).
required_plugins = pytest-xdist
addopts = -n 2 --dist loadscope
